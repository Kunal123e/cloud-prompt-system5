<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CloudAI – Cloud-Based Prompt System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>☁️ CloudAI – Cloud-Based Prompt System</h1>

    {% if user_prompt %}
        <div class="chat-box">
            <div class="question">
                <strong>Question:</strong>
                <p>{{ user_prompt }}</p>
            </div>

            <div class="answer">
                <strong>Answer:</strong>
                <p>{{ response }}</p>
            </div>
        </div>
    {% endif %}

    <form method="POST" class="prompt-form">
        <input type="text" name="prompt" placeholder="Type your prompt here..." required>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
